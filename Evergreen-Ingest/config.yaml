model_id: gpt-4o-mini
extraction_passes: 1     # 3 passes triples API calls; 1 is sufficient for demo
max_workers: 10          # langextract internal parallelism across chunks
max_output_tokens: 4096  # Claude needs 4K+ for 20+ params; OpenAI uses far fewer tokens
max_char_buffer: 6000    # 6000 covers all demo fixtures in a single chunk; extract.py also
                         # dynamically expands this to len(doc)+1 so any doc fits in 1 chunk
api_timeout: 600         # Per-call timeout in seconds (10 min — pipeline runs take 8+ min total)
pipeline_workers: 4      # Background thread pool size — each run holds a worker for 10-60s
fail_on_empty_extraction: true  # Fail pipeline with user-facing error when 0 params extracted
domains:
  - tax
  - benefits
output_dir: output
sources_dir: sources
upload_max_bytes: 5242880  # 5 MB
