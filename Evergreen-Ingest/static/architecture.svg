<svg width="100%" viewBox="0 0 680 470" xmlns="http://www.w3.org/2000/svg" style="font-family: system-ui, -apple-system, sans-serif; background: white;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Ingest container -->
  <rect x="50" y="20" width="580" height="115" rx="12" fill="none" stroke="#888780" stroke-width="0.5" stroke-dasharray="6 4"/>
  <text x="70" y="42" font-size="12" fill="#888780">Ingest produces</text>

  <!-- Chunk -->
  <g>
    <rect x="90" y="55" width="200" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text x="190" y="75" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Chunk</text>
    <text x="190" y="95" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">Parsed document content</text>
  </g>

  <!-- Rule -->
  <g>
    <rect x="390" y="55" width="200" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text x="490" y="75" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Rule</text>
    <text x="490" y="95" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">Extracted policy logic</text>
  </g>

  <!-- Evals container -->
  <rect x="50" y="180" width="580" height="115" rx="12" fill="none" stroke="#888780" stroke-width="0.5" stroke-dasharray="6 4"/>
  <text x="70" y="202" font-size="12" fill="#888780">Evals adds</text>

  <!-- Scenario -->
  <g>
    <rect x="90" y="215" width="200" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
    <text x="190" y="235" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">Scenario</text>
    <text x="190" y="255" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">Test input + answer</text>
  </g>

  <!-- Result -->
  <g>
    <rect x="390" y="215" width="200" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
    <text x="490" y="235" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">Result</text>
    <text x="490" y="255" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">Pass/fail + scores</text>
  </g>

  <!-- Optimize container -->
  <rect x="50" y="340" width="580" height="110" rx="12" fill="none" stroke="#888780" stroke-width="0.5" stroke-dasharray="6 4"/>
  <text x="70" y="362" font-size="12" fill="#888780">Optimize monitors</text>

  <!-- Trace -->
  <g>
    <rect x="220" y="375" width="240" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
    <text x="340" y="395" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#712B13">Trace</text>
    <text x="340" y="415" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993C1D">Production interaction</text>
  </g>

  <!-- Chunk → Scenario (context) -->
  <line x1="190" y1="111" x2="190" y2="213" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="200" y="165" font-size="12" fill="#888780">context</text>

  <!-- Rule → Scenario (ground truth) -->
  <path d="M490,111 L270,213" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="405" y="158" font-size="12" fill="#888780">ground truth</text>

  <!-- Scenario → Result -->
  <line x1="290" y1="243" x2="388" y2="243" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Result → Trace (scores, elbow) -->
  <path d="M490,271 L490,403 L462,403" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="500" y="345" font-size="12" fill="#888780">scores</text>

  <!-- Feedback: Result failures → new Scenarios -->
  <path d="M490,271 C490,320 190,320 190,271" fill="none" stroke="#888780" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="340" y="316" text-anchor="middle" font-size="12" fill="#888780">failures → new tests</text>
</svg>
